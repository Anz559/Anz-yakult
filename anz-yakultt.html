<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anz Yakult</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

    body{
      background: radial-gradient(circle at top, #0f0c29, #302b63, #24243e);
      color:white;
      overflow-x:hidden;
    }

    /* PARTICLE BACKGROUND */
    canvas{
      position:fixed;
      top:0;
      left:0;
      z-index:-1;
    }

    nav{
      display:flex;
      justify-content:space-between;
      padding:20px;
    }

    nav h1{
      color:#00eaff;
      text-shadow:0 0 10px #00eaff;
    }

    nav ul{
      display:flex;
      gap:20px;
      list-style:none;
    }

    nav ul li:hover{
      color:#00eaff;
      cursor:pointer;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:50px;
      min-height:90vh;
    }

    .hero h2{
      font-size:55px;
      background:linear-gradient(90deg,#00eaff,#a855f7);
      -webkit-background-clip:text;
      color:transparent;
      animation:glitch 1s infinite;
    }

    @keyframes glitch{
      0%{text-shadow:2px 2px #ff00ff}
      25%{text-shadow:-2px -2px #00ffff}
      50%{text-shadow:2px -2px #ff00ff}
      75%{text-shadow:-2px 2px #00ffff}
      100%{text-shadow:2px 2px #ff00ff}
    }

    .hero p{
      margin:20px 0;
      color:#ccc;
    }

    .btn{
      padding:12px 30px;
      border:none;
      border-radius:30px;
      background:linear-gradient(90deg,#00eaff,#a855f7);
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.1);
      box-shadow:0 0 20px #00eaff;
    }

    .section{
      padding:80px 20px;
      text-align:center;
    }

    .card{
      background:#111;
      padding:20px;
      border-radius:15px;
      margin:10px;
      display:inline-block;
      width:250px;
      transition:0.3s;
      opacity:0;
      transform:translateY(50px);
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 0 20px #a855f7;
    }

    footer{
      text-align:center;
      padding:20px;
      border-top:1px solid #333;
    }

  </style></head>
<body><canvas id="bg"></canvas>

<nav>
  <h1>Anz Yakult</h1>
  <ul>
    <li>Home</li>
    <li>About</li>
    <li>Features</li>
    <li>Contact</li>
  </ul>
</nav><section class="hero">
  <h2>Anz Yakult</h2>
  <p>Website anime cyberpunk level pro 🔥</p>
  <button class="btn">Mulai Sekarang</button>
</section><section class="section">
  <h2>Fitur Keren</h2>
  <div class="card">UI Futuristik</div>
  <div class="card">Animasi Glitch</div>
  <div class="card">Particle Background</div>
</section><footer>
  <p>© 2026 Anz Yakult</p>
</footer><script>
  // PARTICLE BACKGROUND
  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  for(let i=0;i<100;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      size:Math.random()*2,
      speed:Math.random()*1
    });
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle="white";
      ctx.fill();

      p.y += p.speed;
      if(p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(animate);
  }

  animate();

  // SCROLL ANIMATION
  const cards = document.querySelectorAll('.card');
  window.addEventListener('scroll', () => {
    cards.forEach(card => {
      const top = card.getBoundingClientRect().top;
      if(top < window.innerHeight - 50){
        card.style.opacity = 1;
        card.style.transform = 'translateY(0)';
      }
    });
  });
</script></body>
</html>
